[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @exness/api build"
watchPatterns = ["apps/api/**", "packages/**", "pnpm-lock.yaml", "package.json"]

[deploy]
startCommand = "pnpm --filter @exness/api start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
