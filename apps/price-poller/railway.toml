[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @exness/price-poller build"
watchPatterns = ["apps/price-poller/**", "packages/**", "pnpm-lock.yaml", "package.json"]

[deploy]
startCommand = "pnpm --filter @exness/price-poller start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
