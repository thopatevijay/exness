[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @exness/web build"
watchPatterns = ["apps/web/**", "packages/**", "pnpm-lock.yaml", "package.json"]

[deploy]
startCommand = "pnpm --filter @exness/web start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
